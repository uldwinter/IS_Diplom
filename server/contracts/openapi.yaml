openapi: 3.1.0
info:
  title: Gifted Children IS API
  version: 1.0.0
servers:
  - url: /api/v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login: { type: string }
        password: { type: string }
    TokenPair:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn: { type: integer }
    User:
      type: object
      required: [id, login, name, role, status]
      properties:
        id: { type: integer }
        login: { type: string }
        name: { type: string }
        email: { type: string }
        role: { type: string, enum: [admin, curator, student] }
        status: { type: string, enum: [active, inactive] }
paths:
  /auth/login:
    post:
      summary: Login by credentials
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Token pair
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
  /auth/refresh:
    post:
      summary: Refresh access token
      responses:
        '200': { description: New token pair }
  /users:
    get:
      security: [{ bearerAuth: [] }]
      summary: List users (admin/curator)
      responses:
        '200':
          description: List users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/User' }
  /achievements:
    get:
      security: [{ bearerAuth: [] }]
      summary: List achievements by role scope
      responses:
        '200': { description: Achievements list }
    post:
      security: [{ bearerAuth: [] }]
      summary: Submit student achievement
      responses:
        '201': { description: Created }
  /registrations:
    post:
      summary: Create public student registration request
      responses:
        '201': { description: Created }
